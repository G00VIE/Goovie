name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 👈 ADD THIS EXACT LINE

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: ''
          - os: windows
            arch: amd64
            suffix: '.exe'
          - os: darwin
            arch: amd64
            suffix: ''
          - os: darwin
            arch: arm64
            suffix: ''
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          # Build with ldflags to strip debug info and reduce binary size
          go build -ldflags="-s -w" -o build/goovie-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }} ./cmd/goovie/

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/goovie-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
